x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16
    container_name: run-walk-coach-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: runwalk
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: runwalk
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runwalk -d runwalk"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: run-walk-coach-api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      SESSION_COOKIE_NAME: rwc_session
      CORS_ORIGIN: "${CORS_ORIGIN:-https://run.storycraftbooks.com}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-https://run.storycraftbooks.com/api/auth/google/callback}"
    ports:
      - "4000:4000"

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: run-walk-coach-migrate
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://run.storycraftbooks.com}"
    command: ["pnpm", "--filter", "@run-walk-coach/api", "db:deploy"]
    restart: "no"

volumes:
  postgres_data:
